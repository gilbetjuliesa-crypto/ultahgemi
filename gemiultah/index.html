<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    padding:20px;
    color:white;
}

h1{
    font-size:40px;
}

.message{
    max-width:600px;
    margin:auto;
    margin-bottom:25px;
    font-size:18px;
}

/* Slider */
.slider{
    position:relative;
    max-width:500px;
    margin:auto;
    overflow:hidden;
    border-radius:20px;
}

.slides{
    display:flex;
    transition:transform 0.5s ease;
}

.slides img{
    width:100%;
    border-radius:20px;
}

/* tombol */
button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    font-size:25px;
    padding:10px 15px;
    cursor:pointer;
    border-radius:10px;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}

footer{
    margin-top:30px;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>

<p class="message">
Selamat ulang tahun 🎂✨
Semoga setiap langkahmu selalu dipenuhi kebahagiaan,
setiap harimu dipenuhi senyuman,
dan semua impianmu satu per satu menjadi kenyataan.
</p>

<div class="slider">

<div class="slides" id="slides">
<img src="gemi1.jpg" alt="Foto 1">
<img src="gemi2.jpg" alt="Foto 2">
<img src="gemi3.jpg" alt="Foto 3">
<img src="gemi4.jpg" alt="Foto 4">
<img src="gemi5.jpg" alt="Foto 5">
<img src="gemi6.jpg" alt="Foto 6">
<img src="gemi7.jpg" alt="Foto 7">
</div>

<button class="prev" onclick="prevSlide()">❮</button>
<button class="next" onclick="nextSlide()">❯</button>

</div>

<script>

let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;

function showSlide(){
slides.style.transform = "translateX(" + (-index * 100) + "%)";
}

function nextSlide(){
index++;
if(index >= total){ index = 0; }
showSlide();
}

function prevSlide(){
index--;
if(index < 0){ index = total-1; }
showSlide();
}

</script>
</body>
</html>
